name: CI/CD ShopStream Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flask pytest psycopg2-binary boto3

      - name: Run unit tests
        run: pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Upload scripts to S3
        run: |
          aws s3 cp generate_data.py s3://shopstream-raw-data-dg/scripts/
          aws s3 cp lambda_function.py s3://shopstream-raw-data-dg/scripts/

      - name: Deploy Lambda
        run: |
          zip lambda_function.zip lambda_function.py
          aws lambda update-function-code \
            --function-name shopstream-validate-ingesta \
            --zip-file fileb://lambda_function.zip \
            --region us-east-1
